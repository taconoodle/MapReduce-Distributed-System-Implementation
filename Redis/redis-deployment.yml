apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
    spec:
      containers:
      - name: redis
        image: redis:latest
        command: ["sh", "-c", "redis-server --appendonly yes --requirepass $REDIS_PASSWORD"]
        env:
        - name: REDIS_PASSWORD
          value: "admin" 
        ports:
        - containerPort: 6379
        volumeMounts:
        - name: redis-data          
          mountPath: /data 
      volumes:
      - name: redis-data           
        persistentVolumeClaim:
          claimName: redis-pvc
