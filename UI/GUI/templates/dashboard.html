<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MapReduce | Cluster Dashboard</title>
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background: #1a1a2e; 
            color: #fff; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            margin: 0; 
        }
        .upload-card { 
            background: #16213e; 
            padding: 40px; 
            border-radius: 12px; 
            border: 2px dashed #0f3460; 
            text-align: center; 
            width: 400px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
        }
        .upload-card:hover { border-color: #4ecca3; }
        h2 { color: #4ecca3; margin-top: 0; }
        p { color: #95a5a6; font-size: 14px; }
        
        input[type="file"] { display: none; }
        
        .custom-label { 
            background: #4ecca3; 
            color: #1a1a2e; 
            padding: 12px 24px; 
            border-radius: 6px; 
            cursor: pointer; 
            display: inline-block; 
            font-weight: bold; 
            margin-bottom: 20px; 
            transition: 0.3s;
        }
        .custom-label:hover { background: #45b393; }

        .status-box { 
            margin-top: 20px; 
            font-family: 'Courier New', Courier, monospace; 
            font-size: 12px; 
            color: #4ecca3; 
            text-align: left; 
            background: #1a1a2e; 
            padding: 15px; 
            border-radius: 6px; 
            height: 80px; 
            overflow-y: auto;
            border: 1px solid #0f3460;
        }

        .btn-deploy { 
            margin-top: 20px; 
            width: 100%; 
            padding: 12px; 
            background: transparent; 
            color: #4ecca3; 
            border: 1px solid #4ecca3; 
            border-radius: 6px;
            cursor: pointer; 
            font-weight: bold;
            transition: 0.3s;
        }
        .btn-deploy:hover:not(:disabled) { background: rgba(78, 204, 163, 0.1); }
        .btn-deploy:disabled { opacity: 0.5; cursor: not-allowed; border-color: #444; color: #444; }

        .btn-secondary {
            margin-top: 10px; 
            width: 100%; 
            padding: 10px; 
            background: #0f3460; 
            color: white; 
            border: none; 
            cursor: pointer; 
            border-radius: 6px;
            font-size: 13px;
        }

        .logout-link {
            display: block;
            margin-top: 25px;
            color: #e94560;
            text-align: center;
            text-decoration: none;
            font-size: 13px;
            font-weight: bold;
            transition: 0.3s;
        }
        .logout-link:hover { 
            
            color: #ff5e78; 
            text-shadow: 0 0 8px rgba(233, 69, 96, 0.5);
        }
        
    </style>
</head>
<body>

<div class="upload-card">
    <h2>Submit Job</h2>
    <p>Upload a JSON specification to the distributed cluster.</p>
    
    <label for="jobFile" class="custom-label">Select JSON Config</label>
    <input type="file" id="jobFile" accept=".json" onchange="updateStatus()">

    <div id="status" class="status-box">
        > System: Authenticated<br>
        > Status: Awaiting Input...
    </div>

    <button id="deployBtn" onclick="submitJob()" class="btn-deploy">
        DEPLOY TO CLUSTER
    </button>

    <button onclick="window.location.href='/results'" class="btn-secondary">
        VIEW ACTIVE RESULTS
    </button>

    <a href="/logout" class="logout-link">Sign Out</a>
</div>

<script>
    function updateStatus() {
        const file = document.getElementById('jobFile').files[0];
        const statusBox = document.getElementById('status');
        if (file) {
            statusBox.innerHTML = `> File: ${file.name}<br>> Size: ${file.size} bytes<br>> Ready for deployment.`;
        }
    }

    async function submitJob() {
        const fileInput = document.getElementById('jobFile');
        const statusBox = document.getElementById('status');
        const deployBtn = document.getElementById('deployBtn');
        
        if (fileInput.files.length === 0) {
            alert("Please select a valid .json file!");
            return;
        }

        deployBtn.disabled = true;
        statusBox.innerHTML = "> Initiating Token Relay...<br>> Uploading to Manager Service...";

        const formData = new FormData();
        formData.append("file", fileInput.files[0]); 

        try {
            const response = await fetch('/api/submit-job', {
                method: 'POST',
                body: formData 
                // Note: Auth cookie is sent automatically by the browser
            });

            // Handle Session Expiry (The 401 Safety Net)
            if (response.status === 401) {
                statusBox.innerHTML = "> ERROR: Session Expired.<br>> Redirecting to Login...";
                setTimeout(() => { window.location.href = '/'; }, 1500);
                return;
            }

            const result = await response.json();

            if (response.ok && result.status === "success") {
                // Store metadata for the results page
                localStorage.setItem('active_job_id', result.job_id || 'N/A');
                
                statusBox.innerHTML = `> SUCCESS!<br>> Job ID: ${result.job_id || 'Accepted'}<br>> Redirecting to monitor...`;

                setTimeout(() => {
                    window.location.href = '/results';
                }, 1500);
            } else {
                statusBox.innerHTML = `> ERROR: ${result.message || 'Check System Logs'}`;
                deployBtn.disabled = false;
            }
        } catch (error) {
            console.error("Critical Error:", error);
            statusBox.innerHTML = "> CRITICAL: Connection to UI server lost.";
            deployBtn.disabled = false;
        }
    }
</script>

</body>
</html>
