<!DOCTYPE html>
<html>
<head>
    <title>MapReduce | System Auth</title>
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background: #1a1a2e; 
            color: #fff;
            display: flex; justify-content: center; align-items: center; 
            height: 100vh; margin: 0;
        }
        .login-box { 
            background: #16213e; 
            padding: 40px; 
            border-radius: 12px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.5); 
            width: 350px;
            border: 1px solid #0f3460;
            text-align: center;
        }
        h2 { margin-bottom: 25px; color: #4ecca3; }
        
        .description {
            color: #95a5a6;
            font-size: 14px;
            margin-bottom: 30px;
            line-height: 1.5;
        }

        .login-btn { 
            width: 100%; 
            padding: 14px; 
            background: #4ecca3; 
            border: none; 
            border-radius: 6px; 
            color: #1a1a2e; 
            font-weight: bold; 
            cursor: pointer; 
            font-size: 16px;
            transition: 0.3s;
            text-decoration: none;
            display: inline-block;
        }
        .login-btn:hover { 
            background: #45b393; 
            transform: translateY(-2px); 
            box-shadow: 0 5px 15px rgba(78, 204, 163, 0.3);
        }
        
        .footer { margin-top: 30px; font-size: 12px; color: #546e7a; }
    </style>
</head>
<body>

    <div class="login-box">
        <h2>Cluster Login</h2>
        
        <p class="description">
            Please sign in to manage your MapReduce jobs.
        </p>

        <!-- Direct link to FastAPI trigger -->
        <a href="/login" class="login-btn">
            Sign In with Keycloak
        </a>

        <div class="footer">
            MapReduce v1.0 | Secured by OpenID Connect
        </div>
    </div>

</body>
</html>
