<!DOCTYPE html>
<html>
<head>
    <title>MapReduce | System Auth</title>
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background: #1a1a2e; 
            color: #fff;
            display: flex; justify-content: center; align-items: center; 
            height: 100vh; margin: 0;
        }
        .login-box { 
            background: #16213e; 
            padding: 40px; 
            border-radius: 12px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.5); 
            width: 350px;
            border: 1px solid #0f3460;
        }
        h2 { text-align: center; margin-bottom: 25px; color: #4ecca3; }
        
        .input-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-size: 14px; color: #95a5a6; }
        
        input { 
            width: 100%; 
            padding: 12px; 
            border-radius: 6px; 
            border: 1px solid #0f3460; 
            background: #1a1a2e; 
            color: white;
            box-sizing: border-box; /* Crucial for padding */
        }
        input:focus { outline: none; border-color: #4ecca3; }

        .login-btn { 
            width: 100%; 
            padding: 12px; 
            background: #4ecca3; 
            border: none; 
            border-radius: 6px; 
            color: #1a1a2e; 
            font-weight: bold; 
            cursor: pointer; 
            font-size: 16px;
            transition: 0.3s;
        }
        .login-btn:hover { background: #45b393; transform: translateY(-2px); }
        
        .footer { margin-top: 20px; font-size: 12px; text-align: center; color: #546e7a; }
    </style>
</head>
<body>

    <div class="login-box">
        <h2>Cluster Login</h2>
        
        <form id="loginForm">
            <div class="input-group">
                <label for="username">Username</label>
                <input type="text" id="username" placeholder="e.g. admin" required>
            </div>
            
            <div class="input-group">
                <label for="password">Password</label>
                <input type="password" id="password" placeholder="••••••••" required>
            </div>
            
            <button type="submit" class="login-btn">Sign In</button>
        </form>

        <div class="footer">
            MapReduce v1.0 | Secured by Keycloak
        </div>
    </div>

    <script>
        document.getElementById('loginForm').onsubmit = function(e) {
            e.preventDefault();
            // For now, it just redirects. Later, this is where your 
            // Fetch() call to Keycloak/Auth-Service will go!
            window.location.href = 'dashboard';
        };
    </script>

</body>
</html>
